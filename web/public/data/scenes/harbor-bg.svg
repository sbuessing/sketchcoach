<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Harbor at Golden Hour — pencil scaffolding behind the user's drawings.
       Stroke #808080 at ~30% opacity to match the in-app pencil. -->
  <g stroke="#808080" fill="none" stroke-linecap="round" opacity="0.3">
    <!-- Wispy clouds in the upper sky -->
    <path d="M 180 130 Q 270 118 360 132 Q 410 128 460 138" stroke-width="1.2" opacity="0.6" />
    <path d="M 620 90 Q 700 80 790 95" stroke-width="1.2" opacity="0.6" />

    <!-- Distant headland: a low curve on the left side of the horizon -->
    <path d="M 0 410 Q 100 388 200 400 Q 270 412 340 405" stroke-width="1.4" />

    <!-- Horizon line across the water -->
    <path d="M 0 415 L 1000 415" stroke-width="1" />

    <!-- Water ripples — denser near the horizon, opening toward the dock -->
    <path d="M 40 440 Q 220 436 420 442 Q 620 437 820 442 Q 920 440 990 442" stroke-width="1" />
    <path d="M 60 465 Q 260 460 480 467 Q 680 462 880 466 Q 940 465 990 466" stroke-width="1" />
    <path d="M 30 500 Q 240 495 460 502 Q 660 498 860 502 Q 930 501 990 502" stroke-width="1" />
    <path d="M 80 545 Q 280 540 500 548 Q 700 542 900 547 Q 950 546 990 547" stroke-width="1" />
    <path d="M 30 605 Q 260 600 500 610 Q 720 603 900 609 Q 950 608 990 610" stroke-width="1" />
    <path d="M 60 680 Q 280 674 540 686 Q 760 678 920 685" stroke-width="1" />

    <!-- Dock surface near edge: heavier line where dock meets water -->
    <path d="M 0 740 L 1000 740" stroke-width="1.8" opacity="0.45" />

    <!-- Dock perspective: lines from foreground corners converging to a vp
         near (620, 420). These are intentionally faint guides. -->
    <path d="M 0 1000 L 620 420" stroke-width="1" opacity="0.5" />
    <path d="M 1000 1000 L 620 420" stroke-width="1" opacity="0.5" />
    <path d="M 220 1000 L 580 480" stroke-width="0.8" opacity="0.4" />
    <path d="M 460 1000 L 605 460" stroke-width="0.8" opacity="0.4" />
    <path d="M 720 1000 L 635 460" stroke-width="0.8" opacity="0.4" />

    <!-- Dock plank cross-members -->
    <path d="M 140 850 L 860 850" stroke-width="0.8" opacity="0.45" />
    <path d="M 220 790 L 780 790" stroke-width="0.8" opacity="0.45" />
    <path d="M 290 750 L 710 750" stroke-width="0.8" opacity="0.45" />
  </g>
</svg>
