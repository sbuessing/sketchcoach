<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Garden Courtyard — pencil scaffolding. Stone wall, climbing vines,
       a tree on the right, and terracotta tile floor in perspective. -->
  <g stroke="#808080" fill="none" stroke-linecap="round" opacity="0.3">
    <!-- A wispy cloud high in the sky -->
    <path d="M 220 150 Q 300 138 380 154 Q 420 150 460 162" stroke-width="1" opacity="0.6" />

    <!-- Back wall: top edge and a second line for capstone -->
    <path d="M 0 380 L 1000 380" stroke-width="2.5" />
    <path d="M 0 420 L 1000 420" stroke-width="1" opacity="0.65" />

    <!-- Stone wall texture: irregular brick suggestion marks above the cap -->
    <g stroke-width="1" opacity="0.6">
      <path d="M 50 348 L 90 348" />
      <path d="M 120 360 L 170 360" />
      <path d="M 210 348 L 260 348" />
      <path d="M 300 360 L 350 360" />
      <path d="M 390 348 L 440 348" />
      <path d="M 470 360 L 530 360" />
      <path d="M 570 348 L 620 348" />
      <path d="M 650 360 L 710 360" />
      <path d="M 740 348 L 790 348" />
      <path d="M 820 360 L 880 360" />
      <path d="M 910 348 L 970 348" />
    </g>

    <!-- Climbing vines draping over the wall -->
    <path d="M 130 380 Q 140 410 122 442 Q 128 462 138 448" stroke-width="1.2" />
    <path d="M 310 380 Q 298 415 312 448 Q 320 460 308 446" stroke-width="1.2" />
    <path d="M 500 380 Q 510 415 492 448" stroke-width="1.2" />
    <path d="M 680 380 Q 670 415 685 448 Q 695 462 685 448" stroke-width="1.2" />
    <path d="M 850 380 Q 860 412 848 442" stroke-width="1.2" />

    <!-- Tree on the right: trunk rising from behind the wall, lower branches -->
    <g stroke-width="2">
      <path d="M 880 0 Q 905 200 895 380" />
      <path d="M 890 110 Q 800 90 740 60" stroke-width="1.5" />
      <path d="M 905 220 Q 970 200 985 150" stroke-width="1.5" />
    </g>

    <!-- Terracotta tile floor: horizontal tile lines (spacing opens up toward us) -->
    <path d="M 0 430 L 1000 430" stroke-width="0.8" />
    <path d="M 0 475 L 1000 475" stroke-width="0.8" />
    <path d="M 0 535 L 1000 535" stroke-width="0.8" />
    <path d="M 0 615 L 1000 615" stroke-width="0.8" />
    <path d="M 0 725 L 1000 725" stroke-width="0.8" />
    <path d="M 0 870 L 1000 870" stroke-width="0.8" />

    <!-- Tile floor: vertical lines in two-point perspective, vp at (500, 400) -->
    <path d="M 60 1000 L 440 430" stroke-width="0.8" />
    <path d="M 260 1000 L 475 430" stroke-width="0.8" />
    <path d="M 500 1000 L 500 430" stroke-width="0.8" />
    <path d="M 740 1000 L 525 430" stroke-width="0.8" />
    <path d="M 940 1000 L 560 430" stroke-width="0.8" />

    <!-- Long afternoon shadow streak from the right (tree casts toward lower-left) -->
    <g opacity="0.4">
      <path d="M 880 380 L 600 1000" stroke-width="0.6" />
      <path d="M 920 380 L 700 1000" stroke-width="0.6" />
    </g>
  </g>
</svg>
